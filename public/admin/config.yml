backend:
  name: github
  repo: Yoma20/Topmark        # your-username/your-repo — update if this changes
  branch: main
  base_url: https://YOUR-OAUTH-WORKER.workers.dev   # replace once OAuth worker is deployed, see notes below

# Where uploaded images from the editor get saved / served from
media_folder: "blog/posts/images"
public_folder: "/blog/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "blog/posts"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    extension: "md"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Description", name: "description", widget: "string", hint: "Shown in search results and social previews. Keep under 160 characters." }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }